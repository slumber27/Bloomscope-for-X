    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f7f4;
      --surface: #ffffff;
      --border: #e8e2d9;
      --text: #1e1c19;
      --muted: #8a8278;
      --accent: #2d6a4f;
      --accent2: #b5838d;
      --accent-light: #eaf2ec;
      --accent-hover: #1f4f3a;
      --tag-bg: #eaf2ec;
      --tag-text: #2d6a4f;
      --danger: #b5394a;
      --radius: 10px;
      --shadow: 0 2px 16px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", "Hiragino Sans", sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ヘッダー */
    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .site-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .site-title-wrap {}

    .site-title {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", "Hiragino Sans", sans-serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--text);
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .site-title span {
      color: var(--accent2);
    }

    .site-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.06em;
    }

    /* メインコンテンツ */
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 28px 16px 0;
    }

    /* カード */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px 20px;
      margin-bottom: 14px;
      transition: box-shadow 0.2s;
    }

    .card:focus-within {
      box-shadow: var(--shadow-lg);
    }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* 花の名前 */
    .keyword-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }

    .keyword-row input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .keyword-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,106,79,0.10);
    }

    .synonym-preview {
      font-size: 11px;
      color: var(--accent);
      margin-top: 3px;
      margin-bottom: 4px;
      padding-left: 2px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      min-height: 14px;
    }

    .btn-icon {
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .btn-icon:hover { background: #f0ebe4; color: var(--text); }
    .btn-icon.danger:hover { background: #fdecea; color: var(--danger); border-color: var(--danger); }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--accent);
      background: none;
      border: 1.5px dashed rgba(45,106,79,0.35);
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 4px;
      transition: background 0.15s, border-color 0.2s;
    }

    .btn-add:hover { background: var(--accent-light); border-color: var(--accent); }

    /* 場所 */
    .text-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .text-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,106,79,0.10);
    }

    .field-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* 期間モード切替 */
    .mode-tabs {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
      padding: 3px;
      gap: 3px;
    }

    .mode-tab {
      flex: 1;
      padding: 8px 10px;
      font-size: 12px;
      font-family: inherit;
      background: transparent;
      color: var(--muted);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: center;
      line-height: 1.4;
    }

    .mode-tab.active {
      background: var(--surface);
      color: var(--accent);
      font-weight: 500;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* 年月日モード */
    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .date-field label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
      letter-spacing: 0.03em;
    }

    .date-field input[type="date"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 10px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .date-field input[type="date"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,106,79,0.10);
    }

    /* 月日モード */
    .monthday-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .monthday-group label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .monthday-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .monthday-pair select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 6px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .monthday-pair select:focus { border-color: var(--accent); }

    /* トグル */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 0;
    }

    .toggle-label { font-size: 14px; }

    .toggle {
      position: relative;
      width: 46px;
      height: 26px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 999px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .toggle-track::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle input:checked + .toggle-track::after { transform: translateX(20px); }

    /* 検索ボタン */
    .btn-search {
      display: block;
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", "Hiragino Sans", sans-serif;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(45,106,79,0.25);
      margin-bottom: 10px;
    }

    .btn-search:hover {
      background: var(--accent-hover);
      box-shadow: 0 6px 20px rgba(45,106,79,0.32);
    }

    .btn-search:active { transform: scale(0.99); }

    /* 生成ステータス */
    #generate-status {
      display: none;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      padding: 4px 0 10px;
    }

    #generate-status .status-count { color: var(--accent); font-weight: 500; }

    /* URL一覧 */
    #url-list { display: none; }

    .url-list-header {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      padding: 0 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .url-list-header::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .url-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.15s, transform 0.15s;
    }

    .url-item:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-1px);
    }

    .url-item a {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      text-decoration: none;
      color: var(--text);
      gap: 14px;
      transition: background 0.15s;
    }

    .url-item a:hover { background: var(--accent-light); }

    .url-year {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", "Hiragino Sans", sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent);
      flex-shrink: 0;
      min-width: 56px;
    }

    .url-period {
      font-size: 13px;
      color: var(--muted);
      flex: 1;
      line-height: 1.5;
    }

    .capped-note {
      display: block;
      font-size: 11px;
      color: #b0a898;
      margin-top: 2px;
    }

    .url-arrow {
      font-size: 14px;
      color: var(--accent);
      flex-shrink: 0;
      opacity: 0.6;
    }

    /* エラー */
    .error-msg {
      font-size: 12px;
      color: var(--danger);
      margin-top: 8px;
      display: none;
      padding: 6px 10px;
      background: #fef2f3;
      border-radius: 6px;
      border: 1px solid #f5c6cb;
    }

    /* 同義語タグ */
    .syn-tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(45,106,79,0.15);
    }

    @media (max-width: 480px) {
      .date-row { grid-template-columns: 1fr; }
      .monthday-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-normal" onclick="setMode('normal')">年月日で指定</button>
      <button class="mode-tab" id="tab-monthday" onclick="setMode('monthday')">月日のみ（10年分）</button>
    </div>

    <div id="mode-normal">
      <div class="date-row">
        <div class="date-field">
          <label>開始日（since）</label>
          <input type="date" id="since-date">
        </div>
        <div class="date-field">
          <label>終了日（until）</label>
          <input type="date" id="until-date">
        </div>
      </div>
      <div class="error-msg" id="date-error">開始日は終了日より前に設定してください。</div>
    </div>

    <div id="mode-monthday" style="display:none;">
      <div class="monthday-row">
        <div class="monthday-group">
          <label>開始（月・日）</label>
          <div class="monthday-pair">
            <select id="since-month" onchange="updateDayOptions('since')"><option value="">月</option></select>
            <select id="since-day"><option value="">日</option></select>
          </div>
        </div>
        <div class="monthday-group">
          <label>終了（月・日）</label>
          <div class="monthday-pair">
            <select id="until-month" onchange="updateDayOptions('until')"><option value="">月</option></select>
            <select id="until-day"><option value="">日</option></select>
          </div>
        </div>
      </div>
      <div class="error-msg" id="monthday-error">開始・終了の月と日をすべて選択してください。</div>
    </div>
  </div>

  <!-- オプション -->
  <div class="card">
    <div class="section-label">オプション</div>
    <div class="toggle-row">
      <span class="toggle-label">画像付き投稿のみ（filter:images）</span>
      <label class="toggle">
        <input type="checkbox" id="filter-images" checked>
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <!-- 検索ボタン -->
  <button class="btn-search" id="search-btn" onclick="doSearch()">X で検索する</button>

  <!-- 生成ステータス -->
  <div id="generate-status"></div>

  <!-- URL一覧 -->
  <div id="url-list">
    <div class="url-list-header">年ごとの検索リンク</div>
    <div id="url-items"></div>
  </div>

</main>

<script>
const SYNONYMS = {
  'さくら':['桜','サクラ'], '桜':['さくら','サクラ'], 'サクラ':['桜','さくら'],
  'かわづざくら':['河津桜','カワヅザクラ'], '河津桜':['かわづざくら','カワヅザクラ'],
  'しばざくら':['芝桜','シバザクラ'], '芝桜':['しばざくら','シバザクラ'], 'シバザクラ':['芝桜','しばざくら'],
  'うめ':['梅','ウメ'], '梅':['うめ','ウメ'], 'ウメ':['梅','うめ'],
  'つつじ':['躑躅','ツツジ'], '躑躅':['つつじ','ツツジ'], 'ツツジ':['躑躅','つつじ'],
  'ふじ':['藤','フジ'], '藤':['ふじ','フジ'], 'フジ':['藤','ふじ'],
  'すいせん':['水仙','スイセン'], '水仙':['すいせん','スイセン'], 'スイセン':['水仙','すいせん'],
  'にりんそう':['二輪草','ニリンソウ'], '二輪草':['にりんそう','ニリンソウ'], 'ニリンソウ':['二輪草','にりんそう'],
  'みずばしょう':['水芭蕉','ミズバショウ'], '水芭蕉':['みずばしょう','ミズバショウ'], 'ミズバショウ':['水芭蕉','みずばしょう'],
  'かたくり':['片栗','カタクリ'], '片栗':['かたくり','カタクリ'], 'カタクリ':['片栗','かたくり'],
  'すみれ':['菫','スミレ'], '菫':['すみれ','スミレ'], 'スミレ':['菫','すみれ'],
  'たんぽぽ':['蒲公英','タンポポ'], '蒲公英':['たんぽぽ','タンポポ'], 'タンポポ':['蒲公英','たんぽぽ'],
  'れんげ':['蓮華','レンゲ'], '蓮華':['れんげ','レンゲ'], 'レンゲ':['蓮華','れんげ'],
  'やまぶき':['山吹','ヤマブキ'], '山吹':['やまぶき','ヤマブキ'], 'ヤマブキ':['山吹','やまぶき'],
  'ざぜんそう':['座禅草','ザゼンソウ'], '座禅草':['ざぜんそう','ザゼンソウ'], 'ザゼンソウ':['座禅草','ざぜんそう'],
  'くりんそう':['九輪草','クリンソウ'], '九輪草':['くりんそう','クリンソウ'], 'クリンソウ':['九輪草','くりんそう'],
  'わたすげ':['綿菅','ワタスゲ'], '綿菅':['わたすげ','ワタスゲ'], 'ワタスゲ':['綿菅','わたすげ'],
  'えぞえんごさく':['蝦夷延胡索','エゾエンゴサク'], 'エゾエンゴサク':['蝦夷延胡索','えぞえんごさく'],
  'りゅうきんか':['立金花','リュウキンカ'], 'リュウキンカ':['立金花','りゅうきんか'],
  'チングルマ':['稚児車','ちんぐるま'], 'ちんぐるま':['稚児車','チングルマ'],
  'はくさんいちげ':['白山一花','ハクサンイチゲ'], 'ハクサンイチゲ':['白山一花','はくさんいちげ'],
  'あじさい':['紫陽花','アジサイ'], '紫陽花':['あじさい','アジサイ'], 'アジサイ':['紫陽花','あじさい'],
  'ひまわり':['向日葵','ヒマワリ'], '向日葵':['ひまわり','ヒマワリ'], 'ヒマワリ':['向日葵','ひまわり'],
  'ゆり':['百合','ユリ'], '百合':['ゆり','ユリ'], 'ユリ':['百合','ゆり'],
  'はす':['蓮','ハス'], '蓮':['はす','ハス'], 'ハス':['蓮','はす'],
  'コスモス':['秋桜','こすもす'], '秋桜':['コスモス','こすもす'],
  'きく':['菊','キク'], '菊':['きく','キク'], 'キク':['菊','きく'],
  'ひがんばな':['彼岸花','ヒガンバナ','曼珠沙華'], '彼岸花':['ひがんばな','ヒガンバナ','曼珠沙華'],
  'ヒガンバナ':['彼岸花','ひがんばな','曼珠沙華'], '曼珠沙華':['彼岸花','ひがんばな','ヒガンバナ'],
  'つばき':['椿','ツバキ'], '椿':['つばき','ツバキ'], 'ツバキ':['椿','つばき'],
  'さざんか':['山茶花','サザンカ'], '山茶花':['さざんか','サザンカ'], 'サザンカ':['山茶花','さざんか'],
  'ろうばい':['蝋梅','ロウバイ'], '蝋梅':['ろうばい','ロウバイ'], 'ロウバイ':['蝋梅','ろうばい'],
};

let keywordCount = 0;

function addKeyword() {
  keywordCount++;
  const id = "kw-" + keywordCount;
  const list = document.getElementById("keyword-list");
  const wrapper = document.createElement("div");
  wrapper.id = "kw-wrapper-" + id;
  wrapper.style.marginBottom = "8px";
  wrapper.innerHTML =
    '<div class="keyword-row">' +
    '<input type="text" id="' + id + '" placeholder="例：水芭蕉、ニリンソウ、カタクリ" oninput="showSynonyms(\'' + id + '\')">' +
    '<button class="btn-icon danger" onclick="removeKeyword(\'' + id + '\')" title="削除">×</button>' +
    '</div>' +
    '<div class="synonym-preview" id="syn-' + id + '"></div>';
  list.appendChild(wrapper);
  document.getElementById(id).focus();
}

function removeKeyword(id) {
  const el = document.getElementById("kw-wrapper-" + id);
  if (el) el.remove();
}

function getAllKeywords() {
  return Array.from(document.querySelectorAll("#keyword-list input[type='text']"))
    .map(el => el.value.trim()).filter(Boolean);
}

function getSynonyms(word) {
  const syns = new Set();
  for (const [key, vals] of Object.entries(SYNONYMS)) {
    if (key === word) vals.forEach(v => syns.add(v));
  }
  return [...syns];
}

function showSynonyms(id) {
  const word = document.getElementById(id).value.trim();
  const preview = document.getElementById("syn-" + id);
  if (!word) { preview.innerHTML = ""; return; }
  const syns = getSynonyms(word);
  preview.innerHTML = syns.length
    ? "同義語：" + syns.map(s => '<span class="syn-tag">' + s + '</span>').join(" ")
    : "";
}

let currentMode = "normal";

function setMode(mode) {
  currentMode = mode;
  document.getElementById("mode-normal").style.display   = mode === "normal"   ? "" : "none";
  document.getElementById("mode-monthday").style.display = mode === "monthday" ? "" : "none";
  document.getElementById("tab-normal").classList.toggle("active",   mode === "normal");
  document.getElementById("tab-monthday").classList.toggle("active", mode === "monthday");
  document.getElementById("search-btn").textContent = mode === "monthday"
    ? "10年分のURLを生成する" : "X で検索する";
  document.getElementById("url-list").style.display = "none";
  document.getElementById("url-items").innerHTML = "";
  document.getElementById("generate-status").style.display = "none";
}

function initMonthDaySelects() {
  ["since", "until"].forEach(prefix => {
    const monthSel = document.getElementById(prefix + "-month");
    for (let m = 1; m <= 12; m++) {
      const opt = document.createElement("option");
      opt.value = String(m).padStart(2, "0");
      opt.textContent = m + "月";
      monthSel.appendChild(opt);
    }
    updateDayOptions(prefix);
  });
}

function updateDayOptions(prefix) {
  const month  = parseInt(document.getElementById(prefix + "-month").value) || 0;
  const daySel = document.getElementById(prefix + "-day");
  const prev   = daySel.value;
  const maxDays = month ? new Date(2024, month, 0).getDate() : 31;
  daySel.innerHTML = '<option value="">日</option>';
  for (let d = 1; d <= maxDays; d++) {
    const opt = document.createElement("option");
    opt.value = String(d).padStart(2, "0");
    opt.textContent = d + "日";
    if (opt.value === prev) opt.selected = true;
    daySel.appendChild(opt);
  }
}

function getYearList() {
  const y = new Date().getFullYear();
  return Array.from({length: 10}, (_, i) => y - i);
}

function getTodayStr() {
  const t = new Date();
  return t.getFullYear() + "-" +
    String(t.getMonth() + 1).padStart(2, "0") + "-" +
    String(t.getDate()).padStart(2, "0");
}

function buildKeywordPart() {
  const parts = getAllKeywords().map(word => {
    const syns = getSynonyms(word);
    return syns.length ? "(" + [word, ...syns].join(" OR ") + ")" : word;
  });
  const loc = document.getElementById("location-input").value.trim();
  if (loc) parts.push(loc);
  return parts;
}

function buildOptionParts() {
  const parts = ["lang:ja"];
  if (document.getElementById("filter-images").checked) parts.push("filter:images");
  return parts;
}

function buildNormalQuery() {
  const since = document.getElementById("since-date").value;
  const until = document.getElementById("until-date").value;
  const dateParts = [];
  if (since) dateParts.push("since:" + since);
  if (until) dateParts.push("until:" + until);
  return [...buildKeywordPart(), ...dateParts, ...buildOptionParts()].join(" ");
}

function makeUrl(query) {
  return "https://x.com/search?q=" + encodeURIComponent(query) + "&src=typed_query&f=top";
}

function validate() {
  let ok = true;
  const kwErr = document.getElementById("keyword-error");
  if (getAllKeywords().length === 0) { kwErr.style.display = "block"; ok = false; }
  else kwErr.style.display = "none";

  if (currentMode === "normal") {
    const since = document.getElementById("since-date").value;
    const until = document.getElementById("until-date").value;
    const dateErr = document.getElementById("date-error");
    if (since && until && since >= until) { dateErr.style.display = "block"; ok = false; }
    else dateErr.style.display = "none";
  } else {
    const vals = ["since-month","since-day","until-month","until-day"].map(id => document.getElementById(id).value);
    const mdErr = document.getElementById("monthday-error");
    const filled = vals.filter(Boolean).length;
    if (filled > 0 && filled < 4) { mdErr.style.display = "block"; ok = false; }
    else mdErr.style.display = "none";
  }
  return ok;
}

function doSearch() {
  if (!validate()) return;

  if (currentMode === "normal") {
    window.open(makeUrl(buildNormalQuery()), "_blank");
    return;
  }

  const sm = document.getElementById("since-month").value;
  const sd = document.getElementById("since-day").value;
  const um = document.getElementById("until-month").value;
  const ud = document.getElementById("until-day").value;

  const todayStr = getTodayStr();
  const today = new Date(todayStr);
  const years = getYearList();
  const container = document.getElementById("url-items");
  container.innerHTML = "";

  let generatedCount = 0, skippedCount = 0, cappedCount = 0;

  years.forEach(year => {
    const sinceStr = year + "-" + sm + "-" + sd;
    if (new Date(sinceStr) > today) { skippedCount++; return; }

    let untilStr = year + "-" + um + "-" + ud;
    let capped = false;
    if (new Date(untilStr) > today) { untilStr = todayStr; capped = true; cappedCount++; }

    const query = [...buildKeywordPart(), "since:" + sinceStr, "until:" + untilStr, ...buildOptionParts()].join(" ");
    const url = makeUrl(query);

    const [cy, cm, cd] = todayStr.split("-").map(Number);
    const smI = parseInt(sm), sdI = parseInt(sd), umI = parseInt(um), udI = parseInt(ud);
    let periodText = smI + "/" + sdI + " 〜 " + umI + "/" + udI;
    let cappedNote = "";
    if (capped) {
      periodText = smI + "/" + sdI + " 〜 " + cm + "/" + cd;
      cappedNote = '<span class="capped-note">終了日を本日（' + cm + "/" + cd + '）に調整</span>';
    }

    const item = document.createElement("div");
    item.className = "url-item";
    item.innerHTML =
      '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' +
      '<span class="url-year">' + year + '</span>' +
      '<span class="url-period">' + periodText + cappedNote + '</span>' +
      '<span class="url-arrow">→</span>' +
      '</a>';
    container.appendChild(item);
    generatedCount++;
  });

  const statusEl = document.getElementById("generate-status");
  let html = '<span class="status-count">' + generatedCount + '件</span> のURLを生成しました。';
  if (skippedCount > 0) html += "　未来の日付 " + skippedCount + "年分は除外しました。";
  if (cappedCount > 0) html += "　" + cappedCount + "年分の終了日を本日に調整しました。";
  statusEl.innerHTML = html;
  statusEl.style.display = "block";
  document.getElementById("url-list").style.display = generatedCount > 0 ? "block" : "none";
  if (generatedCount > 0) statusEl.scrollIntoView({ behavior: "smooth", block: "start" });
}

initMonthDaySelects();
addKeyword();
</script>
</body>
</html>
